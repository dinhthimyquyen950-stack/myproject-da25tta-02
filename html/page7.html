<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hóa đơn mua hàng</title>
    <link rel="stylesheet" href="../css/style4.css">
</head>
<body>
    <main class="invoice-page">
        <a class="back-link" href="../index.html">Về trang chủ</a>
        <section class="panel table-panel">
            <p class="eyebrow">Bảng tính</p>
            <h1>Hóa đơn mua hàng</h1>

            <div class="table-wrap">
                <table>
                    <tr>
                        <th>STT</th>
                        <th>Tên hàng</th>
                        <th>Số lượng</th>
                        <th>Đơn giá</th>
                        <th>ĐVT</th>
                        <th>Thành tiền</th>
                    </tr>
                    <tr>
                        <td>1</td>
                        <td>Mì Colusa</td>
                        <td class="soluong">2</td>
                        <td class="dongia">105</td>
                        <td>thùng</td>
                        <td class="thanhtien">?</td>
                    </tr>
                    <tr>
                        <td>2</td>
                        <td>Sữa Ông Thọ</td>
                        <td class="soluong">4</td>
                        <td class="dongia">200</td>
                        <td>thùng</td>
                        <td class="thanhtien">?</td>
                    </tr>
                    <tr>
                        <td>3</td>
                        <td>Xúc xích</td>
                        <td class="soluong">120</td>
                        <td class="dongia">45</td>
                        <td>túi</td>
                        <td class="thanhtien">?</td>
                    </tr>
                    <tr>
                        <td>4</td>
                        <td>Nước mắm</td>
                        <td class="soluong">1</td>
                        <td class="dongia">50</td>
                        <td>chai</td>
                        <td class="thanhtien">?</td>
                    </tr>
                    <tr>
                        <td>5</td>
                        <td>Bánh pía</td>
                        <td class="soluong">2</td>
                        <td class="dongia">60</td>
                        <td>bịch</td>
                        <td class="thanhtien">?</td>
                    </tr>
                    <tr>
                        <td>6</td>
                        <td>Pepsi</td>
                        <td class="soluong">3</td>
                        <td class="dongia">18</td>
                        <td>lon</td>
                        <td class="thanhtien">?</td>
                    </tr>
                    <tr class="total-row">
                        <td colspan="5">Tổng thanh toán</td>
                        <td id="thanhtoan">?</td>
                    </tr>
                </table>
            </div>
        </section>
    </main>

    <script>
        const sl = document.getElementsByClassName("soluong");
        const dg = document.getElementsByClassName("dongia");
        const tt = document.getElementsByClassName("thanhtien");

        let tongthanhtoan = 0;
        for (let i = 0; i < sl.length; i++) {
            const thanhTien = Number(sl[i].textContent) * Number(dg[i].textContent);
            tt[i].textContent = thanhTien.toLocaleString("vi-VN");
            tongthanhtoan += thanhTien;
        }
        document.getElementById("thanhtoan").textContent = tongthanhtoan.toLocaleString("vi-VN");
    </script>
</body>
</html>
