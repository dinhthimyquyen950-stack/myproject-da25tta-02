<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8">
	<link rel="stylesheet" href="../css/style4.css">
    <title>Hóa đơn mua hàng </title>
</head>
<body>
	<h1> HÓA ĐƠN MUA HÀNG CỦA QUÝ KHÁCH  </h1>
	<table>
		<tr> 
			<th> STT </th>
			<th> Tên hàng </th>
			<th> Số lượng </th>
			<th> Đơn giá </th>
			<th> ĐVT </th>
			<th> Thành tiền </th>
		</tr>
	
		<tr>
			<td>1</td>
			<td>Mì colusa</td>
			<td class = "soluong">2</td>
			<td class = "dongia">105</td>
			<td>thùng</td>
			<td class = "thanhtien">
				?
			</td>
		</tr>
		<tr>
			<td>2</td>
			<td>Sữa ông Thọ</td>
			<td class = "soluong">4</td>
			<td class = "dongia">200</td>
			<td>thùng</td>
			<td class = "thanhtien">
				?
			</td>
		</tr>
		<tr>
			<td>3</td>
			<td>Xúc xích</td>
			<td class = "soluong">120</td>
			<td class = "dongia">45</td>
			<td>túi</td>
			<td class = "thanhtien">
				?
			</td>
		</tr>
		<tr>
			<td>4</td>
			<td>Nước mắm</td>
			<td class = "soluong">1</td>
			<td class = "dongia">50</td>
			<td>chai</td>
			<td class = "thanhtien">
				?
			</td>
		</tr>
		<tr>
			<td>5</td>
			<td>Bánh pía</td>
			<td class = "soluong">2</td>
			<td class = "dongia">60</td>
			<td>bịch</td>
			<td class = "thanhtien">
				?
			</td>
		</tr>
		<tr>
			<td>6</td>
			<td>Pepsi</td>
			<td class = "soluong">3</td>
			<td class = "dongia">18</td>
			<td>lon</td>
			<td class = "thanhtien">
				?
			</td>
		</tr>
		<tr>
			<td colspan = "5"> Tổng thanh toán</td>
			<td id = "thanhtoan"
				?
			</td>
		</tr>
		
	</table>
	<script>
		//Truy xuat don gia, thanh tien, so luong qua class
		const sl = document.getElementsByClassName("soluong");
		const dg = document.getElementsByClassName("dongia");
		const tt = document.getElementsByClassName("thanhtien");
		
		let tongthanhtoan = 0;
		for(let i=0; i<sl.length; i++)
		{
			tt[i].innerHTML = Number(sl[i].innerHTML)*Number(dg[i].innerHTML);
			tongthanhtoan += Number(tt[i].innerHTML);
		}
		document.getElementById("thanhtoan").innerHTML = tongthanhtoan;
		
	</script>
		
</body>
</html>
