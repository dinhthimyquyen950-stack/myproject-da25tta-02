<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết sản phẩm</title>
    <link rel="stylesheet" href="../css/style5.css">
</head>
<body>
    <main class="shop-page">
        <a href="page8.html" class="back-link">Quay lại danh mục</a>

        <section class="detail-card" id="container">
            <div class="detail-image">
                <img src="" alt="" id="image">
            </div>

            <div class="detail-info">
                <p class="eyebrow">Chi tiết sản phẩm</p>
                <h1 id="name"></h1>
                <p class="price" id="price"></p>
                <p class="description" id="description"></p>
            </div>
        </section>
    </main>

    <script src="../js/lib.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get("masp");
        const foundProduct = products.find(obj => obj.id === productId);

        if (foundProduct) {
            document.getElementById("name").textContent = foundProduct.name;
            document.getElementById("price").textContent = foundProduct.price + " / sản phẩm";
            document.getElementById("description").innerHTML = foundProduct.description;
            document.getElementById("image").src = foundProduct.image;
            document.getElementById("image").alt = foundProduct.name;
        } else {
            document.getElementById("container").innerHTML = `
                <div class="empty-state">
                    <p class="eyebrow">Không tìm thấy</p>
                    <h1>Sản phẩm không tồn tại hoặc đã bị xóa</h1>
                    <a href="page8.html" class="button-link">Quay lại danh mục</a>
                </div>
            `;
        }
    </script>
</body>
</html>
