<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8">
    <title>Nhập dữ liệu với prompt() và hiển thị với alert() </title>
</head>
<body>
	<script>
	let name = prompt("Hãy nhập vào tên của bạn vàooo đâyy iii  ");
	let yob = Number(prompt("Hãy nhập năm sinh của bạn vào nhen  "));
	window.alert("Xin chào " + name + ", năm nay bạn đã " + (2026-yob) + " tuổi rồi đóaaaaaa.");
	</script>
</body>
</html>
